---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-lockdown
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-lockdown
  namespace: argocd
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-lockdown-keycloak-read
  namespace: keycloak
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-lockdown
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: argocd-lockdown
    namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-lockdown
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-lockdown-keycloak-read
  namespace: keycloak
subjects:
  - kind: ServiceAccount
    name: argocd-lockdown
    namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-lockdown-keycloak-read
---
apiVersion: batch/v1
kind: Job
metadata:
  name: argocd-disable-local-login
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-options: Force=true,Replace=true
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    spec:
      serviceAccountName: argocd-lockdown
      restartPolicy: OnFailure
      initContainers:
        - name: wait-keycloak-ready
          image: registry.k8s.io/kubectl:v1.35.1
          imagePullPolicy: IfNotPresent
          command:
            - kubectl
          args:
            - -n
            - keycloak
            - wait
            - --for=condition=Ready
            - pod/keycloak-0
            - --timeout=7200s
      containers:
        - name: disable-local-login
          image: registry.k8s.io/kubectl:v1.35.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              kubectl -n keycloak get secret keycloak-oidc-tls -o jsonpath='{.data.tls\.crt}' | base64 -d > /tmp/keycloak-oidc.crt
              kubectl -n argocd create configmap argocd-tls-certs-cm --from-file=keycloak.internal.euroscale.local=/tmp/keycloak-oidc.crt -o yaml --dry-run=client | kubectl apply -f -
