---
# ExternalSecret für OpenBao OAuth2 Proxy
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openbao-oauth2-proxy-secrets
  namespace: oauth2-proxy
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: openbao-oauth2-proxy-secrets
    creationPolicy: Owner
  data:
    - secretKey: OAUTH2_PROXY_CLIENT_ID
      remoteRef:
        key: oauth2-proxy/openbao
        property: client_id
    - secretKey: OAUTH2_PROXY_CLIENT_SECRET
      remoteRef:
        key: oauth2-proxy/openbao
        property: client_secret
    - secretKey: OAUTH2_PROXY_COOKIE_SECRET
      remoteRef:
        key: oauth2-proxy/openbao
        property: cookie_secret
