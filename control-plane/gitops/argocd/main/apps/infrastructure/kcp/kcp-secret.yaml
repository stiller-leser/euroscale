---
# ExternalSecret für KCP Konfiguration
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kcp-config
  namespace: kcp
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  
  target:
    name: kcp-config
    creationPolicy: Owner
  
  data:
  - secretKey: server_url
    remoteRef:
      key: kcp/config
      property: server_url
  
  - secretKey: token
    remoteRef:
      key: kcp/config
      property: token