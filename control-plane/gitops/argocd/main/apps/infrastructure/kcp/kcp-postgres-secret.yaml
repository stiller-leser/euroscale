---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kcp-postgres-credentials
  namespace: kcp
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: kcp-postgres-credentials
    creationPolicy: Owner
  data:
  - secretKey: username
    remoteRef:
      key: kcp/postgres
      property: username
  - secretKey: password
    remoteRef:
      key: kcp/postgres
      property: password
  - secretKey: host
    remoteRef:
      key: kcp/postgres
      property: host
  - secretKey: database
    remoteRef:
      key: kcp/postgres
      property: database
  - secretKey: endpoint
    remoteRef:
      key: kcp/postgres
      property: endpoint
