---
# Bootstrap CRD for KCP Workspace resources.
# This is synced to the registered ArgoCD destination "kcp-root"
# so tenancy.kcp.io APIs are available in kcp itself.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workspaces.tenancy.kcp.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  group: tenancy.kcp.io
  scope: Cluster
  names:
    plural: workspaces
    singular: workspace
    kind: Workspace
    listKind: WorkspaceList
    shortNames:
      - ws
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                type:
                  type: string
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
---
# Bootstrap CRD for KCP WorkspaceType resources.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workspacetypes.tenancy.kcp.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  group: tenancy.kcp.io
  scope: Cluster
  names:
    plural: workspacetypes
    singular: workspacetype
    kind: WorkspaceType
    listKind: WorkspaceTypeList
    shortNames:
      - wst
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
