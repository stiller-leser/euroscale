apiVersion: v1
kind: Service
metadata:
  name: keycloak-nodeport
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: keycloak-https-proxy
  ports:
    - name: https
      port: 443
      targetPort: 8443
      nodePort: 30843
