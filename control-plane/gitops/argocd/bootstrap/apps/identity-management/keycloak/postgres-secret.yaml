---
# ExternalSecret für PostgreSQL Credentials (aus OpenBao)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  
  target:
    name: postgres-credentials
    creationPolicy: Owner
  
  data:
  - secretKey: username
    remoteRef:
      key: keycloak/postgres
      property: username
  
  - secretKey: password
    remoteRef:
      key: keycloak/postgres
      property: password
  
  - secretKey: host
    remoteRef:
      key: keycloak/postgres
      property: host
  
  - secretKey: database
    remoteRef:
      key: keycloak/postgres
      property: database
---
# ExternalSecret für Keycloak Admin Credentials
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-admin-credentials
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  
  target:
    name: keycloak-admin-credentials
    creationPolicy: Owner
  
  data:
  - secretKey: username
    remoteRef:
      key: keycloak/admin
      property: username
  
  - secretKey: password
    remoteRef:
      key: keycloak/admin
      property: password
