# ClusterSecretStore für globalen Zugriff auf OpenBao
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  provider:
    vault:
      server: "http://openbao.openbao.svc.cluster.local:8200"
      path: "euroscale"  # KV-v2 Mount Path
      version: "v2"   # KV Version 2
      
      # Authentication via Kubernetes auth method
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"
---
# Zusätzlicher SecretStore für Agency-spezifische Secrets
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-agencies
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  provider:
    vault:
      server: "http://openbao.openbao.svc.cluster.local:8200"
      path: "agencies"  # Separater Mount für Mandanten
      version: "v2"
      
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"
