apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: euroscale-local-root-ca
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: euroscale-local-root-ca
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
  data:
    - secretKey: tls.crt
      remoteRef:
        key: keycloak/oidc-ca
        property: tls_crt
    - secretKey: tls.key
      remoteRef:
        key: keycloak/oidc-ca
        property: tls_key
