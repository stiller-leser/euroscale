apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: euroscale-internal-gateway
  namespace: istio-system
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*.internal.euroscale.local"
        - "*.agencies.euroscale.local"
      tls:
        httpsRedirect: true
    - port:
        number: 443
        name: https
        protocol: HTTPS
      hosts:
        - "*.internal.euroscale.local"
        - "*.agencies.euroscale.local"
      tls:
        mode: SIMPLE
        credentialName: euroscale-local-wildcard-tls
