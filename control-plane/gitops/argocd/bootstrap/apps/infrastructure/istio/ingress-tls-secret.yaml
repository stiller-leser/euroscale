apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: euroscale-local-wildcard-tls
  namespace: istio-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: euroscale-local-wildcard-tls
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
  data:
    - secretKey: tls.crt
      remoteRef:
        key: tls/internal-euroscale-local
        property: tls_crt
    - secretKey: tls.key
      remoteRef:
        key: tls/internal-euroscale-local
        property: tls_key
