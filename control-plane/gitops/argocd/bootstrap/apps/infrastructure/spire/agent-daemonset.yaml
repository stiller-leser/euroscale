apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: spire-agent
  namespace: spire-system
spec:
  selector:
    matchLabels:
      app: spire-agent
  template:
    metadata:
      labels:
        app: spire-agent
    spec:
      serviceAccountName: spire-agent
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      initContainers:
        - name: wait-for-spire-server
          image: busybox:1.36.1
          command:
            - /bin/sh
            - -c
            - |
              until nc -zv spire-server.spire-system.svc 8081 2>/dev/null; do
                echo "Waiting for spire-server..."
                sleep 3
              done
      containers:
        - name: spire-agent
          image: ghcr.io/spiffe/spire-agent:1.10.0
          args:
            - -config
            - /run/spire/config/agent.conf
          volumeMounts:
            - name: spire-config
              mountPath: /run/spire/config
              readOnly: true
            - name: spire-sockets
              mountPath: /run/spire/sockets
            - name: spire-token
              mountPath: /var/run/secrets/tokens
              readOnly: true
        - name: tcp-proxy
          image: alpine/socat:latest
          args:
            - TCP-LISTEN:8081,fork,reuseaddr
            - UNIX-CONNECT:/run/spire/sockets/spire-agent.sock
          ports:
            - containerPort: 8081
              protocol: TCP
          volumeMounts:
            - name: spire-sockets
              mountPath: /run/spire/sockets
          # liveness/readiness probes not configured:
          # spire-agent healthcheck is unavailable in this image (distroless + no health endpoint)
          # DaemonSet default RestartPolicy:Always handles failures
      volumes:
        - name: spire-config
          configMap:
            name: spire-agent
        - name: spire-sockets
          hostPath:
            path: /run/spire/sockets
            type: DirectoryOrCreate
        - name: spire-token
          projected:
            sources:
              - serviceAccountToken:
                  path: spire-agent
                  audience: spire-server
                  expirationSeconds: 3600
