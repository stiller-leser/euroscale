---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: spire-db-owner
  namespace: spire-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: spire-db-owner
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  data:
  - secretKey: username
    remoteRef:
      key: spire/postgres
      property: username
  - secretKey: password
    remoteRef:
      key: spire/postgres
      property: password
