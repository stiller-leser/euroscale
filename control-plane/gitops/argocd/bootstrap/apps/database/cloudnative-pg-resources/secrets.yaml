---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-superuser
  namespace: cnpg
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cnpg-superuser
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  data:
  - secretKey: username
    remoteRef:
      key: cnpg/superuser
      property: username
  - secretKey: password
    remoteRef:
      key: cnpg/superuser
      property: password
