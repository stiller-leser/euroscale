apiVersion: v1
kind: Secret
metadata:
  name: argocd-secret
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-secret
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/managed-by: Helm
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    meta.helm.sh/release-name: argocd
    meta.helm.sh/release-namespace: argocd
type: Opaque
stringData:
  # Fallback for local bootstrap. ExternalSecret may overwrite this key.
  oidcKeycloakClientSecret: argocd-local-secret
  # Required by ArgoCD for session/token signing.
  server.secretkey: euroscale-local-argocd-server-secretkey-bootstrap
