---
# ExternalSecret für ArgoCD OIDC Client Secret.
# Das Zielsecret `argocd-secret` wird im selben Kustomization-Set bereitgestellt.
# ESO merged nur den Key `oidcKeycloakClientSecret` aus OpenBao in dieses bestehende Secret.
#
# Voraussetzung: euroscale/argocd/oidc-client wurde von init-oauth2-proxy-secrets.sh
# in OpenBao geschrieben.
#
# sync-wave "0": sobald ArgoCD bootstrappt, wird der OIDC-Client-Secret-Key
# fruehzeitig in `argocd-secret` gemerged.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-oidc-secret
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
    # Merge statt Owner: argocd-secret existiert bereits (durch GitOps Secret-Manifest)
    # und enthält weitere Keys die ArgoCD intern braucht.
    # Owner würde das Secret löschen und neu erstellen - das würde ArgoCD brechen.
    deletionPolicy: Retain
  data:
    - secretKey: oidcKeycloakClientSecret
      remoteRef:
        key: euroscale/argocd/oidc-client
        property: client_secret
