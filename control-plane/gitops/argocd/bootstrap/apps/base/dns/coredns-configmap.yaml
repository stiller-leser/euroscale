apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
data:
  Corefile: |
    .:53 {
        errors
        health {
           lameduck 5s
        }
        ready
        rewrite name exact keycloak.internal.euroscale.local istio-ingressgateway.istio-system.svc.cluster.local
        rewrite name exact argocd.internal.euroscale.local istio-ingressgateway.istio-system.svc.cluster.local
        rewrite name exact openbao.internal.euroscale.local istio-ingressgateway.istio-system.svc.cluster.local
        rewrite name exact backstage.internal.euroscale.local istio-ingressgateway.istio-system.svc.cluster.local
        kubernetes cluster.local in-addr.arpa ip6.arpa {
           pods insecure
           fallthrough in-addr.arpa ip6.arpa
           ttl 30
        }
        prometheus :9153
        forward . /etc/resolv.conf {
           max_concurrent 1000
        }
        cache 30 {
           disable success cluster.local
           disable denial cluster.local
        }
        loop
        reload
        loadbalance
    }
