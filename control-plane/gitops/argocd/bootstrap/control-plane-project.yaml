apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: control-plane
  namespace: argocd
spec:
  description: Project for all Euroscale control-plane Argo CD applications
  sourceRepos:
    - '*'
  destinations:
    - namespace: '*'
      server: '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
