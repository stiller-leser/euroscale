apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: agencies
  namespace: argocd
spec:
  description: Project for dynamic agency applications created from AgencyStack claims
  sourceRepos:
    - '*'
  destinations:
    - namespace: '*'
      server: '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
