apiVersion: v1
kind: ConfigMap
metadata:
  name: agency-{{ required "agencyName is required" .Values.agencyName }}-catalog
  namespace: backstage
  labels:
    app.kubernetes.io/part-of: agencies
    euro.scale/agency: {{ .Values.agencyName | quote }}
data:
  catalog-info.yaml: |
{{- $members := default (list) .Values.access.members }}
    apiVersion: backstage.io/v1alpha1
    kind: Group
    metadata:
      name: agencies-admins
      annotations:
        backstage.euroscale.io/scope-agencies-argocd: "true"
    spec:
      type: team
      profile:
        displayName: Agencies Admins
      children: []
{{- if gt (len $members) 0 }}
      members:
{{- range $member := $members }}
{{- $localPart := lower (first (splitList "@" $member)) }}
{{- $entityName := trimAll "-" (regexReplaceAll "[^a-z0-9_.-]+" $localPart "-") }}
        - {{ $entityName }}
{{- end }}
{{- else }}
      members: []
{{- end }}
    ---
    apiVersion: backstage.io/v1alpha1
    kind: System
    metadata:
      name: gitops-platform
      annotations:
        backstage.euroscale.io/scope-agencies-argocd: "true"
    spec:
      owner: group:default/agencies-admins
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: argocd-{{ .Values.agencyName }}
      annotations:
        argocd/project-name: {{ default .Values.agencyName .Values.argocd.projectName | quote }}
        backstage.euroscale.io/scope-agencies-argocd: "true"
    spec:
      type: service
      lifecycle: production
      owner: group:default/agencies-admins
      system: gitops-platform
{{- range $member := $members }}
{{- $localPart := lower (first (splitList "@" $member)) }}
{{- $entityName := trimAll "-" (regexReplaceAll "[^a-z0-9_.-]+" $localPart "-") }}
    ---
    apiVersion: backstage.io/v1alpha1
    kind: User
    metadata:
      name: {{ $entityName }}
      description: Agency member {{ $member }}
    spec:
      profile:
        displayName: {{ $entityName | quote }}
        email: {{ $member | quote }}
      memberOf:
        - agencies-admins
{{- end }}
