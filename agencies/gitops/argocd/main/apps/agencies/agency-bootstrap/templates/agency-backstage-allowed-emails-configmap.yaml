apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-{{ required "agencyName is required" .Values.agencyName }}-allowed-emails
  namespace: oauth2-proxy
  labels:
    app.kubernetes.io/part-of: agencies
    euro.scale/agency: {{ .Values.agencyName | quote }}
data:
  authorized-emails: |
{{- range $member := (default (list) .Values.access.members) }}
    {{ $member }}
{{- end }}
