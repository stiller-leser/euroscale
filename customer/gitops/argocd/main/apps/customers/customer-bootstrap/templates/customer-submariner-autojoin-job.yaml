{{- if and (eq (default "local-vcluster" .Values.clusterClass) "local-vcluster") (default false .Values.network.interconnect.enabled) (eq (default "submariner" .Values.network.interconnect.mode) "submariner") (default false .Values.network.interconnect.autoJoin.enabled) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "customer.submarinerJoinJobName" . }}
  namespace: {{ include "customer.vclusterNamespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "9"
  labels:
    app.kubernetes.io/part-of: customers
    euro.scale/agency: {{ .Values.agencyName | quote }}
    euro.scale/customer: {{ .Values.customerName | quote }}
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: customers
        euro.scale/agency: {{ .Values.agencyName | quote }}
        euro.scale/customer: {{ .Values.customerName | quote }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: subctl-join
          image: {{ default "quay.io/submariner/subctl:0.17.0" .Values.network.interconnect.autoJoin.subctlImage | quote }}
          command:
            - /subctl
          args:
            - join
            - /broker/broker-info.subm
            - --kubeconfig
            - /kubeconfig/config
            - --clusterid
            - {{ include "customer.id" . | quote }}
            - --cable-driver
            - {{ default "wireguard" .Values.network.interconnect.cableDriver | quote }}
{{- if (default false .Values.network.interconnect.globalnet) }}
            - --globalnet
{{- end }}
{{- if .Values.network.interconnect.autoJoin.clusterCIDR }}
            - --clustercidr
            - {{ .Values.network.interconnect.autoJoin.clusterCIDR | quote }}
{{- end }}
{{- if .Values.network.interconnect.autoJoin.serviceCIDR }}
            - --servicecidr
            - {{ .Values.network.interconnect.autoJoin.serviceCIDR | quote }}
{{- end }}
          volumeMounts:
            - name: broker-info
              mountPath: /broker
              readOnly: true
            - name: customer-kubeconfig
              mountPath: /kubeconfig
              readOnly: true
      volumes:
        - name: broker-info
          secret:
            secretName: {{ default "submariner-broker-info" .Values.network.interconnect.autoJoin.brokerInfoSecretRef.name | quote }}
            items:
              - key: {{ default "broker-info.subm" .Values.network.interconnect.autoJoin.brokerInfoSecretRef.key | quote }}
                path: broker-info.subm
        - name: customer-kubeconfig
          secret:
            secretName: {{ include "customer.kubeconfigSecretName" . }}
            items:
              - key: config
                path: config
{{- end }}
