apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "customer.catalogConfigMapName" . }}
  namespace: backstage
  labels:
    app.kubernetes.io/part-of: customers
    euro.scale/agency: {{ include "customer.agencyLabel" . | quote }}
    euro.scale/customer: {{ include "customer.customerLabel" . | quote }}
data:
  catalog-info.yaml: |
{{- $members := default (list) .Values.access.members }}
    apiVersion: backstage.io/v1alpha1
    kind: Group
    metadata:
      name: agencies-admins
      annotations:
        backstage.euroscale.io/scope-agencies-argocd: "true"
    spec:
      type: team
      profile:
        displayName: {{ printf "%s Customer Admins" .Values.customerName | quote }}
      children: []
{{- if gt (len $members) 0 }}
      members:
{{- range $member := $members }}
{{- $localPart := lower (first (splitList "@" $member)) }}
{{- $entityName := trimAll "-" (regexReplaceAll "[^a-z0-9_.-]+" $localPart "-") }}
        - {{ $entityName }}
{{- end }}
{{- else }}
      members: []
{{- end }}
    ---
    apiVersion: backstage.io/v1alpha1
    kind: System
    metadata:
      name: customer-platform
      annotations:
        backstage.euroscale.io/scope-agencies-argocd: "true"
    spec:
      owner: "group:default/agencies-admins"
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: {{ include "customer.argocdApplicationName" . }}
      annotations:
        argocd/app-name: {{ include "customer.argocdApplicationName" . | quote }}
        backstage.euroscale.io/scope-agencies-argocd: "true"
    spec:
      type: service
      lifecycle: production
      owner: "group:default/agencies-admins"
      system: customer-platform
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: {{ printf "%s-cluster" (include "customer.argocdApplicationName" .) | trunc 63 | trimSuffix "-" }}
      description: Cluster provisioning and addon deployment status.
      annotations:
        argocd/app-name: {{ include "customer.argocdApplicationName" . | quote }}
        backstage.euroscale.io/scope-agencies-argocd: "true"
    spec:
      type: infrastructure
      lifecycle: production
      owner: "group:default/agencies-admins"
      system: customer-platform
{{- range $member := $members }}
{{- $localPart := lower (first (splitList "@" $member)) }}
{{- $entityName := trimAll "-" (regexReplaceAll "[^a-z0-9_.-]+" $localPart "-") }}
    ---
    apiVersion: backstage.io/v1alpha1
    kind: User
    metadata:
      name: {{ $entityName }}
      description: Customer member {{ $member }}
    spec:
      profile:
        displayName: {{ $entityName | quote }}
        email: {{ $member | quote }}
      memberOf:
        - agencies-admins
{{- end }}
