{{- if eq (default "local-vcluster" .Values.clusterClass) "local-vcluster" }}
apiVersion: helm.crossplane.io/v1beta1
kind: Release
metadata:
  name: {{ include "customer.crossplaneReleaseName" . }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app.kubernetes.io/part-of: customers
    euro.scale/agency: {{ .Values.agencyName | quote }}
    euro.scale/customer: {{ .Values.customerName | quote }}
spec:
  providerConfigRef:
    name: {{ include "customer.crossplaneProviderConfigName" . }}
  rollbackLimit: 3
  forProvider:
    namespace: crossplane-system
    chart:
      name: crossplane
      repository: https://charts.crossplane.io/stable
      version: {{ .Values.crossplane.chartVersion | quote }}
    values:
      args:
        - --enable-environment-configs
{{- with .Values.crossplane.values }}
{{ toYaml . | nindent 6 }}
{{- end }}
{{- end }}
