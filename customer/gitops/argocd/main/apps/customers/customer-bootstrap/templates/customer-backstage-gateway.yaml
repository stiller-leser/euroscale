apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: {{ include "customer.gatewayName" . }}
  namespace: istio-system
  labels:
    app.kubernetes.io/part-of: customers
    euro.scale/agency: {{ include "customer.agencyLabel" . | quote }}
    euro.scale/customer: {{ include "customer.customerLabel" . | quote }}
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http-{{ include "customer.id" . }}
        protocol: HTTP
      hosts:
        - {{ include "customer.host" . | quote }}
      tls:
        httpsRedirect: true
    - port:
        number: 443
        name: https-{{ include "customer.id" . }}
        protocol: HTTPS
      hosts:
        - {{ include "customer.host" . | quote }}
      tls:
        mode: SIMPLE
        credentialName: {{ include "customer.certificateName" . }}
