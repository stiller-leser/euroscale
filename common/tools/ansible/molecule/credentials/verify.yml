---
- name: Verify
  hosts: molecule-test
  gather_facts: false
  vars:
    credentials_show_argocd: true
    credentials_show_keycloak: true
    credentials_show_openbao: false
  tasks:
    - name: Import credentials role
      import_role:
        name: credentials

    - name: Verify argocd_admin_username fact is set
      ansible.builtin.assert:
        that:
          - argocd_admin_username is defined
          - argocd_admin_username == "admin"
        fail_msg: "ArgoCD admin username not set"

    - name: Verify argocd_admin_password fact is set
      ansible.builtin.assert:
        that:
          - argocd_admin_password is defined
          - argocd_admin_password | length > 0
        fail_msg: "ArgoCD admin password not set"

    - name: Verify keycloak_admin_username fact is set
      ansible.builtin.assert:
        that:
          - keycloak_admin_username is defined
          - keycloak_admin_username | length > 0
        fail_msg: "Keycloak admin username not set"

    - name: Verify keycloak_admin_password fact is set
      ansible.builtin.assert:
        that:
          - keycloak_admin_password is defined
          - keycloak_admin_password | length > 0
        fail_msg: "Keycloak admin password not set"