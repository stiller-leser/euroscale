---
- name: Explain External Secrets store existence wait
  ansible.builtin.debug:
    msg: >-
      Waiting for External Secrets CRDs and ClusterSecretStores (vault-backend, vault-agencies).
      This can look idle while ArgoCD applies CRDs/resources in background.

- name: Load ClusterSecretStore definitions from GitOps manifest
  ansible.builtin.set_fact:
    eso_cluster_secret_store_names: >-
      {{
        (
          lookup(
            'ansible.builtin.file',
            control_plane_root ~ '/gitops/argocd/bootstrap/apps/secrets-management/external-secrets-resources/secret-store.yaml'
          )
          | from_yaml_all
          | list
          | selectattr('kind', 'equalto', 'ClusterSecretStore')
          | map(attribute='metadata')
          | map(attribute='name')
          | list
        )
      }}

- name: Ensure at least one ClusterSecretStore was found in manifest
  ansible.builtin.assert:
    that:
      - (eso_cluster_secret_store_names | length) > 0
    fail_msg: >-
      No ClusterSecretStore entries found in
      gitops/argocd/bootstrap/apps/secrets-management/external-secrets-resources/secret-store.yaml.

- name: Show ClusterSecretStores to wait for
  ansible.builtin.debug:
    msg: "Waiting for ClusterSecretStores: {{ eso_cluster_secret_store_names | join(', ') }}"

- name: Wait for ClusterSecretStore CRD to exist
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: clustersecretstores.external-secrets.io
  register: eso_clustersecretstore_crd
  retries: 120
  delay: 5
  until: (eso_clustersecretstore_crd.resources | length) > 0

- name: Wait for each ClusterSecretStore to exist
  kubernetes.core.k8s_info:
    api_version: external-secrets.io/v1
    kind: ClusterSecretStore
    name: "{{ item }}"
  register: eso_cluster_secret_store_info
  retries: 120
  delay: 5
  until: (eso_cluster_secret_store_info.resources | length) > 0
  loop: "{{ eso_cluster_secret_store_names }}"
  loop_control:
    label: "{{ item }}"
