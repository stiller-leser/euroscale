---
- name: Explain KCP kubeconfig sync wait
  ansible.builtin.debug:
    msg: >-
      Waiting for KCP deployment and admin.kubeconfig discovery before writing euroscale/kcp/root-kubeconfig.
      This can appear stuck while KCP is still reconciling startup.

- name: Resolve KCP namespace and deployment targets
  ansible.builtin.set_fact:
    kcp_namespace: "{{ lookup('ansible.builtin.env', 'KCP_NAMESPACE') | default('kcp', true) }}"
    kcp_deployment: "{{ lookup('ansible.builtin.env', 'KCP_DEPLOYMENT') | default('kcp', true) }}"
    argocd_namespace: "{{ lookup('ansible.builtin.env', 'ARGOCD_NAMESPACE') | default('argocd', true) }}"
    kcp_argocd_application: "{{ lookup('ansible.builtin.env', 'KCP_ARGOCD_APPLICATION') | default('kcp', true) }}"
    kcp_wait_timeout_seconds: "{{ lookup('ansible.builtin.env', 'KCP_WAIT_TIMEOUT_SECONDS') | default('900', true) | int }}"
    kcp_wait_interval_seconds: "{{ lookup('ansible.builtin.env', 'KCP_WAIT_INTERVAL_SECONDS') | default('5', true) | int }}"

- name: Wait for ArgoCD KCP application to exist
  ansible.builtin.command:
    argv:
      - kubectl
      - -n
      - "{{ argocd_namespace }}"
      - get
      - application
      - "{{ kcp_argocd_application }}"
      - -o
      - name
  register: kcp_argocd_application_info
  changed_when: false
  retries: "{{ [1, (kcp_wait_timeout_seconds // kcp_wait_interval_seconds)] | max }}"
  delay: "{{ kcp_wait_interval_seconds }}"
  until: kcp_argocd_application_info.rc == 0

- name: Wait for KCP deployment resource to exist
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ kcp_namespace }}"
    name: "{{ kcp_deployment }}"
  register: kcp_deployment_info
  retries: "{{ [1, (kcp_wait_timeout_seconds // kcp_wait_interval_seconds)] | max }}"
  delay: "{{ kcp_wait_interval_seconds }}"
  until: (kcp_deployment_info.resources | length) > 0

- name: Wait for KCP deployment to become available
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ kcp_namespace }}"
    name: "{{ kcp_deployment }}"
  register: kcp_deployment_available_info
  retries: "{{ [1, (kcp_wait_timeout_seconds // kcp_wait_interval_seconds)] | max }}"
  delay: "{{ kcp_wait_interval_seconds }}"
  until:
    - (kcp_deployment_available_info.resources | length) > 0
    - (kcp_deployment_available_info.resources[0].status.availableReplicas | default(0) | int) > 0

- name: Explain KCP root kubeconfig secret dependency
  ansible.builtin.debug:
    msg: >-
      If Argo reports ExternalSecret errors for key kcp/root-kubeconfig during startup,
      this is expected until this sync step writes the final kubeconfig payload to OpenBao.

- name: Discover KCP admin kubeconfig path
  ansible.builtin.shell: |
    set -euo pipefail
    kubectl -n "{{ kcp_namespace }}" exec "deployment/{{ kcp_deployment }}" -- sh -lc '
    for p in \
      /data/admin.kubeconfig \
      /root/.kcp/admin.kubeconfig \
      /home/kcp/.kcp/admin.kubeconfig \
      /home/nonroot/.kcp/admin.kubeconfig \
      /.kcp/admin.kubeconfig
    do
      if [ -s "$p" ]; then
        echo "$p"
        exit 0
      fi
    done
    if command -v find >/dev/null 2>&1; then
      find /data /root /home -maxdepth 5 -type f -name admin.kubeconfig 2>/dev/null | head -n1
    fi
    '
  args:
    executable: /bin/bash
    chdir: "{{ control_plane_root }}"
  register: kcp_admin_kubeconfig_path
  changed_when: false
  retries: "{{ [1, (lookup('ansible.builtin.env', 'KCP_KUBECONFIG_DISCOVERY_TIMEOUT_SECONDS') | default('180', true) | int // (lookup('ansible.builtin.env', 'KCP_KUBECONFIG_DISCOVERY_INTERVAL_SECONDS') | default('5', true) | int)) | int] | max }}"
  delay: "{{ lookup('ansible.builtin.env', 'KCP_KUBECONFIG_DISCOVERY_INTERVAL_SECONDS') | default('5', true) | int }}"
  until: (kcp_admin_kubeconfig_path.stdout | trim | length) > 0

- name: Read KCP admin kubeconfig content
  ansible.builtin.command:
    argv:
      - kubectl
      - -n
      - "{{ kcp_namespace }}"
      - exec
      - "deployment/{{ kcp_deployment }}"
      - --
      - sh
      - -lc
      - "cat {{ kcp_admin_kubeconfig_path.stdout | trim | quote }}"
  args:
    chdir: "{{ control_plane_root }}"
  register: kcp_admin_kubeconfig_raw
  changed_when: false

- name: Ensure KCP kubeconfig content is non-empty
  ansible.builtin.assert:
    that:
      - (kcp_admin_kubeconfig_raw.stdout | trim | length) > 0
    fail_msg: "Fetched KCP admin.kubeconfig is empty."

- name: Persist temporary KCP kubeconfig locally
  ansible.builtin.copy:
    dest: "{{ control_plane_root }}/kubeconfig/kcp-admin.from-pod.kubeconfig"
    content: "{{ kcp_admin_kubeconfig_raw.stdout }}"
    mode: "0600"

- name: Build ArgoCD cluster auth payload from KCP kubeconfig
  ansible.builtin.command:
    argv:
      - kubectl
      - config
      - view
      - --raw
      - -o
      - json
  args:
    chdir: "{{ control_plane_root }}"
  environment:
    KUBECONFIG: "{{ control_plane_root }}/kubeconfig/kcp-admin.from-pod.kubeconfig"
  register: kcp_kubeconfig_json
  changed_when: false

- name: Parse KCP kubeconfig JSON
  ansible.builtin.set_fact:
    kcp_kcfg: "{{ kcp_kubeconfig_json.stdout | from_json }}"

- name: Extract KCP cluster/user material
  ansible.builtin.set_fact:
    kcp_server_url: "{{ (kcp_kcfg.clusters | default([]) | first).cluster.server | default('') }}"
    kcp_ca_data: "{{ (kcp_kcfg.clusters | default([]) | first).cluster['certificate-authority-data'] | default('') }}"
    kcp_token: "{{ (kcp_kcfg.users | default([]) | first).user.token | default('') }}"
    kcp_client_cert_data: "{{ (kcp_kcfg.users | default([]) | first).user['client-certificate-data'] | default('') }}"
    kcp_client_key_data: "{{ (kcp_kcfg.users | default([]) | first).user['client-key-data'] | default('') }}"

- name: Read cert-manager KCP serving cert secret
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    namespace: "{{ kcp_namespace }}"
    name: kcp-server-tls
  register: kcp_server_tls_secret_info
  changed_when: false
  failed_when: false

- name: Prefer cert-manager CA bundle for KCP cluster trust
  ansible.builtin.set_fact:
    kcp_effective_ca_data: >-
      {{
        (
          kcp_server_tls_secret_info.resources[0].data['ca.crt']
          if (
            (kcp_server_tls_secret_info.resources | default([]) | length) > 0 and
            (kcp_server_tls_secret_info.resources[0].data | default({})) is mapping and
            (kcp_server_tls_secret_info.resources[0].data['ca.crt'] | default('') | length) > 0
          )
          else kcp_ca_data
        )
      }}

- name: Build ArgoCD config object for KCP
  ansible.builtin.set_fact:
    kcp_argocd_config_obj: >-
      {{
        {
          'tlsClientConfig': ({'insecure': (kcp_effective_ca_data | length == 0)}
            | combine({'caData': kcp_effective_ca_data} if (kcp_effective_ca_data | length > 0) else {})
            | combine({'certData': kcp_client_cert_data, 'keyData': kcp_client_key_data} if (kcp_client_cert_data | length > 0 and kcp_client_key_data | length > 0) else {}))
        }
        | combine({'bearerToken': kcp_token} if (kcp_token | length > 0) else {})
      }}

- name: Write KCP root kubeconfig data to OpenBao
  ansible.builtin.shell: |
    set -euo pipefail
    pod="{{ openbao_pods.resources[0].metadata.name }}"
    kubectl -n openbao exec "${pod}" -- \
      env VAULT_ADDR="${VAULT_ADDR:-http://127.0.0.1:8200}" VAULT_TOKEN="{{ openbao_root_token }}" \
      bao kv put "{{ lookup('ansible.builtin.env', 'OPENBAO_KCP_ROOT_KUBECONFIG_PATH') | default('euroscale/kcp/root-kubeconfig', true) }}" \
      "server={{ kcp_server_url }}" \
      'config={{ kcp_argocd_config_obj | to_json }}' \
      "kubeconfig_b64={{ kcp_admin_kubeconfig_raw.stdout | b64encode }}" >/dev/null
  args:
    executable: /bin/bash
    chdir: "{{ control_plane_root }}"
  no_log: true

- name: Remove temporary KCP kubeconfig
  ansible.builtin.file:
    path: "{{ control_plane_root }}/kubeconfig/kcp-admin.from-pod.kubeconfig"
    state: absent
