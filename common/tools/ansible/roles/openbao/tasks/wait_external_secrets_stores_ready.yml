---
- name: Explain External Secrets readiness wait
  ansible.builtin.debug:
    msg: >-
      Waiting for ClusterSecretStores to become Ready=True.
      This may take time while OpenBao auth/unseal settles and ESO retries login.

- name: Load ClusterSecretStore definitions from GitOps manifest
  ansible.builtin.set_fact:
    eso_cluster_secret_store_names: >-
      {{
        (
          lookup(
            'ansible.builtin.file',
            control_plane_root ~ '/gitops/argocd/bootstrap/apps/secrets-management/external-secrets-resources/secret-store.yaml'
          )
          | from_yaml_all
          | list
          | selectattr('kind', 'equalto', 'ClusterSecretStore')
          | map(attribute='metadata')
          | map(attribute='name')
          | list
        )
      }}

- name: Ensure at least one ClusterSecretStore was found in manifest
  ansible.builtin.assert:
    that:
      - (eso_cluster_secret_store_names | length) > 0
    fail_msg: >-
      No ClusterSecretStore entries found in
      gitops/argocd/bootstrap/apps/secrets-management/external-secrets-resources/secret-store.yaml.

- name: Show ClusterSecretStores readiness targets
  ansible.builtin.debug:
    msg: "Waiting for Ready=True on ClusterSecretStores: {{ eso_cluster_secret_store_names | join(', ') }}"

- name: Wait for each ClusterSecretStore Ready condition
  kubernetes.core.k8s_info:
    api_version: external-secrets.io/v1
    kind: ClusterSecretStore
    name: "{{ item }}"
  register: eso_cluster_secret_store_ready
  retries: 120
  delay: 5
  until: >-
    (eso_cluster_secret_store_ready.resources | length) > 0 and
    (
      (
        eso_cluster_secret_store_ready.resources[0].status.conditions | default([])
        | selectattr('type', 'equalto', 'Ready')
        | map(attribute='status')
        | list
        | first
        | default('False')
      ) == 'True'
    )
  loop: "{{ eso_cluster_secret_store_names }}"
  loop_control:
    label: "{{ item }}"
