---
- name: Retrieve ArgoCD admin password
  tags: [credentials, argocd]
  when: credentials_show_argocd | default(true)
  block:
    - name: Get ArgoCD initial admin secret
      k8s_info:
        api_version: v1
        kind: Secret
        name: argocd-initial-admin-secret
        namespace: argocd
      register: argocd_secret_raw

    - name: Set argocd admin credentials
      set_fact:
        argocd_admin_username: "admin"
        argocd_admin_password: "{{ argocd_secret_raw.resources[0].data.password | b64decode }}"

- name: Retrieve Keycloak admin credentials
  when: credentials_show_keycloak | default(true)
  block:
    - name: Get Keycloak admin secret
      k8s_info:
        api_version: v1
        kind: Secret
        name: "{{ keycloak_admin_secret_name | default('keycloak-admin-credentials') }}"
        namespace: "{{ keycloak_namespace | default('keycloak') }}"
      register: keycloak_secret_raw

    - name: Set keycloak admin credentials
      set_fact:
        keycloak_admin_username: "{{ keycloak_secret_raw.resources[0].data.username | b64decode }}"
        keycloak_admin_password: "{{ keycloak_secret_raw.resources[0].data.password | b64decode }}"

- name: Retrieve OpenBao root token
  when: credentials_show_openbao | default(true)
  block:
    - name: Get OpenBao root token from init secret
      k8s_info:
        api_version: v1
        kind: Secret
        name: "{{ openbao_secret_name | default('openbao-root-token') }}"
        namespace: "{{ openbao_namespace | default('openbao') }}"
      register: openbao_secret_raw
      failed_when: false

    - name: Set OpenBao root token
      set_fact:
        openbao_root_token: "{{ openbao_secret_raw.resources[0].data.token | b64decode }}"
      when: openbao_secret_raw.resources | length > 0

- name: Display credentials
  when: credentials_verbose | default(true) | bool
  debug:
    msg: |
      {% if argocd_admin_username is defined %}
      ArgoCD admin:
        username: {{ argocd_admin_username }}
        password: {{ argocd_admin_password }}
      {% endif %}
      {% if keycloak_admin_username is defined %}
      Keycloak admin:
        username: {{ keycloak_admin_username }}
        password: {{ keycloak_admin_password }}
      {% endif %}
      {% if openbao_root_token is defined %}
      OpenBao root token: {{ openbao_root_token }}
      {% endif %}