---
- name: Generate internal CA key
  tags: [certs, internal_gateway]
  when: certs_ensure_internal_gateway | default(true)
  community.crypto.openssl_privatekey:
    path: "{{ internal_ca_key }}"
    size: 2048

- name: Generate internal CA certificate
  tags: [certs, internal_gateway]
  when: certs_ensure_internal_gateway | default(true)
  community.crypto.x509_certificate:
    path: "{{ internal_ca_crt }}"
    privatekey_path: "{{ internal_ca_key }}"
    provider: selfsigned
    selfsigned_not_after: "+3650d"
    subject:
      C: US
      ST: Local
      L: Local
      O: "{{ certs_organization | default('Euroscale') }}"
      OU: ControlPlane
      CN: "Euroscale Internal CA"

- name: Generate wildcard TLS key
  tags: [certs, internal_gateway]
  when: certs_ensure_internal_gateway | default(true)
  community.crypto.openssl_privatekey:
    path: "{{ wildcard_tls_key }}"
    size: 2048

- name: Generate wildcard TLS CSR
  tags: [certs, internal_gateway]
  when: certs_ensure_internal_gateway | default(true)
  community.crypto.openssl_csr:
    path: "{{ wildcard_tls_csr }}"
    privatekey_path: "{{ wildcard_tls_key }}"
    subject:
      C: US
      ST: Local
      L: Local
      O: "{{ certs_organization | default('Euroscale') }}"
      OU: ControlPlane
      CN: "{{ wildcard_internal_host }}"

- name: Sign wildcard TLS certificate
  tags: [certs, internal_gateway]
  when: certs_ensure_internal_gateway | default(true)
  community.crypto.x509_certificate:
    path: "{{ wildcard_tls_crt }}"
    csr_path: "{{ wildcard_tls_csr }}"
    privatekey_path: "{{ internal_ca_key }}"
    issuer_publickey_path: "{{ internal_ca_crt }}"
    provider: ownca
    ownca_not_after: "+825d"
    extended_key_usage:
      - serverAuth
    subject_alt_name: "{{ wildcard_san_list }}"
  register: tls_crt

- name: Create internal gateway TLS Kubernetes secret
  tags: [certs, internal_gateway, k8s]
  when: certs_ensure_internal_gateway | default(true) and certs_apply_to_k8s | default(true)
  k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: euroscale-local-ca
        namespace: "{{ istio_namespace }}"
      data:
        ca.crt: "{{ lookup('file', internal_ca_crt) | b64encode }}"
  ignore_errors: true